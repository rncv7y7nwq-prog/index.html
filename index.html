<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>Plant Mood Matcher</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f3f7f0;
            margin: 0;
            padding: 20px;
        }

        h1 {
            text-align: center;
            color: #2f5d3a;
        }

        .container {
            max-width: 700px;
            margin: 0 auto;
            background: white;
            padding: 20px 25px 30px;
            border-radius: 12px;
            box-shadow: 0 0 18px rgba(0,0,0,0.08);
        }

        label {
            font-weight: bold;
            margin-top: 15px;
            display: block;
        }

        select {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            border-radius: 6px;
            border: 1px solid #c7d2c4;
            background: #f9fbf8;
        }

        button {
            width: 100%;
            padding: 12px;
            margin-top: 22px;
            background: #2f5d3a;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
            letter-spacing: 0.03em;
        }

        button:hover {
            background: #3c7a4d;
        }

        .result {
            margin-top: 28px;
            padding: 20px;
            border: 2px solid #2f5d3a;
            border-radius: 12px;
            display: none;
            background: #ffffff;
        }

        .result img {
            width: 100%;
            max-height: 260px;
            object-fit: cover;
            border-radius: 10px;
        }

        .plant-name {
            font-size: 22px;
            font-weight: bold;
            margin-top: 14px;
            color: #2f5d3a;
        }

        .plant-tags {
            margin-top: 4px;
            font-size: 13px;
            color: #5f7b63;
            font-style: italic;
        }

        .plant-description {
            margin-top: 10px;
            line-height: 1.5;
            color: #333;
        }
    </style>
</head>
<body>

<h1>Plant Mood Matcher</h1>

<div class="container">
    <label for="mood">Kies je stemming:</label>
    <select id="mood">
        <option value="relaxed">Relaxed</option>
        <option value="energiek">Energiek</option>
        <option value="cozy">Cozy</option>
        <option value="productief">Productief</option>
        <option value="vrolijk">Vrolijk</option>
    </select>

    <label for="light">Hoeveel licht is er in huis?</label>
    <select id="light">
        <option value="veel">Veel licht</option>
        <option value="weinig">Weinig licht</option>
    </select>

    <label for="care">Hoeveel onderhoud wil je?</label>
    <select id="care">
        <option value="weinig">Weinig onderhoud</option>
        <option value="gemiddeld">Gemiddeld</option>
        <option value="veel">Veel zorg</option>
    </select>

    <button onclick="findPlant()">Vind mijn plant</button>

    <div class="result" id="result">
        <img id="plantImage" src="" alt="Plant">
        <div class="plant-name" id="plantName"></div>
        <div class="plant-tags" id="plantTags"></div>
        <p class="plant-description" id="plantDescription"></p>
    </div>
</div>

    function findPlant() {
        const mood = document.getElementById("mood").value;
        const light = document.getElementById("light").value;
        const care = document.getElementById("care").value;

        const key = `${mood}_${light}_${care}`;
        const plant = plants[key];

        if (plant) {
            document.getElementById("plantImage").src = plant.img;
            document.getElementById("plantImage").alt = plant.name;
            document.getElementById("plantName").textContent = plant.name;
            document.getElementById("plantTags").textContent = plant.tags;
            document.getElementById("plantDescription").textContent = plant.desc;
            document.getElementById("result").style.display = "block";
        }
    }
